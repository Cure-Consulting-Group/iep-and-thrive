name: IEPAndThrive
options:
  bundleIdPrefix: com.cureconsulting
targets:
  IEPAndThrive:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources: [IEPAndThrive]
    dependencies:
      - sdk: CoreHaptics.framework
      - sdk: SpriteKit.framework
      - sdk: SwiftData.framework
      - package: ComposableArchitecture
      # `Dependencies` and `CasePaths` are transitive products that TCA
      # pulls in via swift-dependencies / swift-case-paths. The regular
      # `xcodebuild build` flow links them automatically, but the
      # build-for-testing flow (which builds the app as a test host)
      # drops the transitive links — emit explicit references so test
      # runs find the symbols they need.
      - package: ComposableArchitecture
        product: Dependencies
      - package: ComposableArchitecture
        product: CasePaths
      - package: Firebase
        product: FirebaseAuth
      - package: Firebase
        product: FirebaseFirestore
      - package: GoogleSignIn
        product: GoogleSignIn
      - package: GoogleSignIn
        product: GoogleSignInSwift
    settings:
      INFOPLIST_FILE: IEPAndThrive/Resources/Info.plist
      GENERATE_INFOPLIST_FILE: YES
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      # Sign in with Apple capability. Building on the simulator (and in
      # CI with code signing disabled) works without a Team ID; running
      # on a real device requires the team's signing identity to allow
      # the entitlement.
      CODE_SIGN_ENTITLEMENTS: IEPAndThrive/Resources/IEPAndThrive.entitlements

  IEPAndThriveTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources: [IEPAndThriveTests]
    dependencies:
      - target: IEPAndThrive
      - package: ComposableArchitecture
      # Same transitive-link workaround as the app target. We avoid
      # referencing any other transitive TCA package directly (Concurrency-
      # Extras, CustomDump, etc.) from test code so we don't have to chase
      # more explicit-product entries — see Box helper in TestHelpers.swift.
      - package: ComposableArchitecture
        product: Dependencies
      - package: ComposableArchitecture
        product: CasePaths
    settings:
      GENERATE_INFOPLIST_FILE: YES

packages:
  ComposableArchitecture:
    url: https://github.com/pointfreeco/swift-composable-architecture
    from: 1.10.0
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    from: 12.0.0
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: 9.0.0

