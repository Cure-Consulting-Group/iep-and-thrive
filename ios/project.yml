name: IEPAndThrive
options:
  bundleIdPrefix: com.cureconsulting
targets:
  IEPAndThrive:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources: [IEPAndThrive]
    dependencies:
      - sdk: CoreHaptics.framework
      - sdk: SpriteKit.framework
      - sdk: SwiftData.framework
      - package: ComposableArchitecture
    settings:
      INFOPLIST_FILE: IEPAndThrive/Resources/Info.plist
      GENERATE_INFOPLIST_FILE: YES
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  IEPAndThriveTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources: [IEPAndThriveTests]
    dependencies:
      - target: IEPAndThrive
      - package: ComposableArchitecture
    settings:
      GENERATE_INFOPLIST_FILE: YES

packages:
  ComposableArchitecture:
    url: https://github.com/pointfreeco/swift-composable-architecture
    from: 1.10.0

