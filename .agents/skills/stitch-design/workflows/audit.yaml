name: stitch-design-audit
description: "Audit design consistency across Stitch project screens against DESIGN.md tokens"
trigger:
  skill: stitch-design
  intent: audit
  phrases:
    - "design audit"
    - "check design consistency"
    - "token drift report"
    - "design system compliance"

steps:
  - id: load_design_md
    agent: stitch-design
    tool: Read
    inputs:
      paths:
        - "[repo]/.stitch/DESIGN.md"
        - "[repo]/DESIGN.md"
      fallback: "[skill-root]/assets/DESIGN.md.default"
    outputs:
      design_system: "string"
      token_definitions:
        colors: "array"
        typography: "array"
        spacing: "array"
        radii: "array"

  - id: list_screens
    agent: stitch-design
    tool: stitch-mcp
    inputs:
      tool_name: "list_screens"
      arguments:
        projectId: "${resolve_project.project_id}"
    outputs:
      screens: "array"

  - id: analyze_screens
    agent: stitch-design
    tool: stitch-mcp
    loop: "${list_screens.screens}"
    inputs:
      - tool_name: "get_screen_code"
        arguments:
          projectId: "${resolve_project.project_id}"
          screenId: "${item.screen_id}"
      - tool_name: "get_screen_image"
        arguments:
          projectId: "${resolve_project.project_id}"
          screenId: "${item.screen_id}"
    outputs:
      screen_analysis: "array"

  - id: analyze_tokens
    agent: stitch-design
    skill: stitch-design
    loop: "${analyze_screens.screen_analysis}"
    inputs:
      html_content: "${item.html_content}"
      design_system: "${load_design_md.design_system}"
      token_definitions: "${load_design_md.token_definitions}"
    operations:
      - "Extract all color hex values from CSS/inline styles"
      - "Extract all font-size, font-family, font-weight values"
      - "Extract all padding, margin, gap values"
      - "Extract all border-radius values"
      - "Compare each extracted value against token_definitions"
      - "Flag any value not matching a defined token as drift"
    outputs:
      drift_items: "array"
      compliance_score: "number"

  - id: emit_drift_report
    agent: stitch-design
    tool: Write
    inputs:
      path: "[repo]/design/audit-report.md"
      content: |
        # Design Audit Report — ${date}

        ## Summary
        - **Screens analyzed:** ${list_screens.screens.length}
        - **Token compliance:** ${aggregate_compliance}%
        - **Drift items found:** ${total_drift_items}

        ## Findings

        | Screen | Issue | Expected Token | Actual Value | Severity |
        |---|---|---|---|---|
        ${drift_table_rows}

        ## Recommendations
        ${recommendations}

        ## Token Coverage
        | Category | Defined | Used | Unused | Undefined Usage |
        |---|---|---|---|---|
        | Colors | ${color_stats} |
        | Typography | ${type_stats} |
        | Spacing | ${spacing_stats} |
        | Border Radius | ${radius_stats} |

        ---
        Generated by stitch-design audit workflow.
    outputs:
      report_path: "string"

  - id: update_state
    agent: stitch-design
    tool: Edit
    inputs:
      file: "[repo]/STATE.md"
      append: |
        ## Design Audit
        - Date: ${date}
        - Compliance: ${aggregate_compliance}%
        - Drift items: ${total_drift_items}
        - Report: design/audit-report.md

error_handling:
  on_mcp_failure:
    action: retry
    max_retries: 2
    backoff_seconds: 3
    fallback: "Notify user that Stitch MCP is unavailable. Run audit against local HTML files in design/screens/ if available."
  on_no_design_md:
    action: "Cannot audit without a DESIGN.md. Prompt user to create one using the generate workflow first."
  on_parse_failure:
    action: "Log parsing errors for individual screens. Continue with remaining screens. Note failures in report."

state_updates:
  - file: "STATE.md"
    section: "Design Audit"
    action: upsert
    data:
      audit_date: "${date}"
      compliance_score: "${aggregate_compliance}"
      drift_count: "${total_drift_items}"
      report_path: "design/audit-report.md"
