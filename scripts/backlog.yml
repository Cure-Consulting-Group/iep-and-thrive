      - Quiet hours configurable on instructor side.

  - id: D9
    epic: "epic-d"
    milestone: "Horizon 2 — Year 2 Productization"
    title: "SMS notifications for time-critical events (Twilio)"
    priority: "P2"
    effort: "M"
    body: |
      What: Twilio integration for the time-critical subset of
      notifications: urgent attention flags (D2), late pickup (D6),
      cohort cancellations.

      Why: Email lag is unacceptable for these events. SMS is the only
      reliable channel for "right now" parent attention.

      Acceptance:
