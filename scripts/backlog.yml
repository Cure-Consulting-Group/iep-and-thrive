  # ---- Epic E — Data, Compliance, Reliability ----
  - id: E1
    epic: "epic-e"
    milestone: "Horizon 0 — Cohort 1 Launch"
    title: "Firestore daily backup automation"
    priority: "P0"
    effort: "S"
    status: "done"
    body: |
      What: Scheduled Cloud Function (or gcloud scheduler job) that runs
      a Firestore export to a dedicated GCS bucket nightly with 30-day
      retention.

      Why: Storing parent and student data without backups is malpractice.
      Cheap, fast, must exist before first deposit data lands.

      Acceptance:
      - Nightly export verified by restore test.
      - Bucket lifecycle: 30-day retention.
      - Alert on backup failure.

  - id: E2
    epic: "epic-e"
    milestone: "Horizon 0 — Cohort 1 Launch"
    title: "Cyber/E&O + general liability + abuse rider insurance"
    priority: "P0"
    effort: "M"
