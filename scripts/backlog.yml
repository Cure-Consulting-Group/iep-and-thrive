  # ---- Epic G — Email Lifecycle System ----
  - id: G1
    epic: "epic-g"
    milestone: "Horizon 0 — Cohort 1 Launch"
    title: "Email foundation: shared layout + variable schema + test-send mode"
    priority: "P0"
    effort: "M"
    body: |
      What: Single shared `<EmailLayout>` shell (header + body slot +
      footer with address, sender ID, unsubscribe), typed variable
      schema for personalization (parentName, studentName, programTrack,
      cohortStartISO, portalUrl, deadlineISO, etc.), plain-text fallback
      generator, and an admin test-send tool that previews any template
      with a chosen persona's data.

      Why: 8 templates ship today, ~22 more coming. Without a shared
      shell every new template re-styles headers/footers — drift is
      guaranteed. Variable schema prevents merge-tag bugs in production.
      Test-send tool prevents shipping broken templates to real parents.

      Acceptance:
      - functions/src/email-templates.ts exports renderEmail(
          layout opts incl. preheader, content, footer notes
        ) used by all current and future templates.
      - All 8 existing templates retrofitted to the new shell.
      - Plain-text fallback auto-generated and attached to every send.
      - Mobile-responsive (verify at 320px width).
      - Admin can preview any template via /admin/email-log "Preview"
        button or a Cloud Function callable.

  - id: G2
    epic: "epic-g"
    milestone: "Horizon 0 — Cohort 1 Launch"
    title: "CAN-SPAM compliance: unsubscribe + physical address + opt-out enforcement"
    priority: "P0"
    effort: "S"
    body: |
      What: Every commercial email must include a physical postal
      address, sender identification, a one-click unsubscribe link, and
      respect opt-outs within 10 days. Implement a global `unsubscribed`
      flag on `users/{uid}` profile + a one-click /unsubscribe?token=
      route that flips it. Marketing/lifecycle emails check the flag
      before sending; transactional emails (bookings, attendance flags,
      reports) ignore it.

      Why: Current 8 templates have zero unsubscribe affordance and no
      physical address. Legal exposure today, even at low volume.
      P0 because the moment we send any new lifecycle email, a parent
      could complain.

      Acceptance:
      - users.unsubscribed: boolean field, default false
      - One-click /unsubscribe?token=<HMAC of uid> route
      - Token-signed link prevents enumeration attacks
      - Footer of every email renders address + unsubscribe link
        (or "transactional — required for your enrollment" for txn)
      - sendEmail() service checks flag for marketing/lifecycle category
      - Address sourced from env (OPERATOR_PHYSICAL_ADDRESS); founder
        confirms before merge

  - id: G3
    epic: "epic-g"
    milestone: "Horizon 0 — Cohort 1 Launch"
    title: "Pre-program ramp series: T-30 / T-14 / T-7 / Day-before"
    priority: "P0"
    effort: "L"
    body: |
      What: Four scheduled emails to every deposited family in the
      run-up to Day 1 (Tue Jul 7, 2026):
      - T-30: "What's coming — IEP review week starts"
      - T-14: "Two weeks out — pickup/dropoff logistics"
      - T-7:  "Final week — what to bring, what to expect"
      - Day-before: "See you tomorrow at 9am"

      Why: Drives Day-1 readiness. Parents who receive logistics 7 days
      out arrive prepared; parents who don't show up confused, miss
      forms, or skip Day 1 entirely. Direct primary metric for Epic G.

      Acceptance:
      - 4 templates registered in email-templates.ts
      - Scheduled Cloud Function (sendPreProgramRamp) running daily at
        9:00 ET, gates by date math (T-30/T-14/T-7/T-1)
      - Skips if user.unsubscribed (G2) or isTest (E13)
      - Personalized: parentName, studentName, cohortStartISO, location
      - emailLog/ entry per send

  - id: G4
    epic: "epic-g"
    milestone: "Horizon 0 — Cohort 1 Launch"
    title: "Balance due reminder series: T-30 / T-14 / T-7"
    priority: "P0"
    effort: "M"
    done: true
    body: |
      What: Three scheduled reminders for deposited families whose
      balance hasn't been paid yet, ending T-2 weeks before program
      start (June 23, 2026). Each links directly to Stripe Checkout
      for the balance.

      Why: Balance is 75% of tuition revenue per family. A single
      missed balance is $2,625-$3,000. Reminders are the lowest-cost
      revenue-protection lever we have.

      Acceptance:
      - 3 templates with progressive urgency (informational →
        reminder → final-call)
      - Scheduled function checks Stripe for balance paid status
      - Skips families who paid balance early
      - Links use stripeCheckout endpoint with type=balance
      - emailLog tagged template=balance_due_T<n>

  - id: G5
    epic: "epic-g"
    milestone: "Horizon 1 — Cohort 1 Operate"
    title: "Final report delivery + program wrap email"
    priority: "P0"
    effort: "M"
    body: |
      What: Email triggered when admin publishes the CSE-ready final
      report for a student (sets progressReports.weekNumber=7 with
      reportUrl). Renders the report link inside the IEP & Thrive
      shell with a wrap message about CSE meeting prep, next-steps,
      and post-program survey.

      Why: This is THE handoff moment. Final report is the deliverable
      that justifies $4K tuition and lets parents walk into September
      CSE meetings with documented evidence. The email is the bow on
      the package — every alum family judges program quality on the
      polish of this moment.

      Acceptance:
      - Firestore trigger on progressReports/{id} write where
