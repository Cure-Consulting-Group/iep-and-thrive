      - Bounce/complaint status from provider.
      - Resend action.

  # ---- Epic E — Data, Compliance, Reliability ----
  - id: E1
    epic: "epic-e"
    milestone: "Horizon 0 — Cohort 1 Launch"
    title: "Firestore daily backup automation"
    priority: "P0"
    effort: "S"
    body: |
      What: Scheduled Cloud Function (or gcloud scheduler job) that runs
      a Firestore export to a dedicated GCS bucket nightly with 30-day
      retention.

      Why: Storing parent and student data without backups is malpractice.
      Cheap, fast, must exist before first deposit data lands.

      Acceptance:
      - Nightly export verified by restore test.
      - Bucket lifecycle: 30-day retention.
      - Alert on backup failure.

  - id: E2
    epic: "epic-e"
    milestone: "Horizon 0 — Cohort 1 Launch"
    title: "Cyber/E&O + general liability + abuse rider insurance"
    priority: "P0"
    effort: "M"
    body: |
      What: Procure required policies before first student arrives:
      cyber/E&O (data breach), general liability (premises), and abuse/
      molestation rider (mandatory for any kid-facing program).

      Why: Founder confirmed insurance is required and not yet purchased.
      No insurance, no program — full stop.

      Acceptance:
      - Policies bound and certificates on file.
      - Premises landlord listed as additional insured if required.
      - Renewal calendar entry created.

  - id: E3
    epic: "epic-e"
    milestone: "Horizon 0 — Cohort 1 Launch"
    title: "Signed enrollment agreement (PDF, e-sign) replacing checkbox"
    priority: "P0"
    effort: "M"
    body: |
      What: Replace the current "I agree" checkbox with a real e-sign flow
      (Documenso, Dropbox Sign, or similar) producing a signed PDF stored
      against the parent record.

      Why: A checkbox is not a signed contract. For deposit, refund, and
      liability disputes we need a proper artifact.

      Acceptance:
      - Signed PDF with timestamp and IP captured per parent.
      - Stored in Firebase Storage with restricted access.
      - Inserted into the /enroll/[program]/confirm flow (A9).

  - id: E4
    epic: "epic-e"
    milestone: "Horizon 1 — Cohort 1 Operate"
    title: "PII access audit logs"
    priority: "P1"
    effort: "M"
    body: |
      What: Log all admin reads and writes to PII fields (parent contact
      info, child IEP, intake notes) with actor, timestamp, and field-
      level diff.

      Why: Required for any future B2B / district relationship and good
      hygiene regardless. Cheap insurance against an internal incident.

      Acceptance:
      - Logged via Firestore trigger or wrapper.
      - Queryable in an admin view.
      - Retention policy documented.

  - id: E5
    epic: "epic-e"
    milestone: "Horizon 1 — Cohort 1 Operate"
    title: "Add Sentry (or equivalent) error tracking"
    priority: "P1"
    effort: "S"
    body: |
      What: Wire Sentry into the Next.js app and Firebase Functions with
      release tagging and source maps.

      Why: With one operator, silent errors during cohort hours are
      catastrophic. Sentry gives the founder a same-day signal.

      Acceptance:
      - Browser + server + functions all reporting.
      - Source maps uploaded on deploy.
      - Slack/email alert on first occurrence of new errors.

  - id: E6
    epic: "epic-e"
    milestone: "Horizon 1 — Cohort 1 Operate"
    title: "Smoke-test suite for critical flows (Playwright)"
    priority: "P1"
    effort: "L"
    body: |
      What: Playwright suite covering: enrollment form submit → Stripe
      checkout (test mode), parent sign-in, intake form completion, admin
      Today's Plan loads.

      Why: With a solo founder and infrequent deploys, manual QA is the
      bottleneck. A 5-flow smoke suite catches the 80% of regressions.

      Acceptance:
      - Runs in CI on PR.
      - < 5 minutes total.
      - Stripe in test mode; no live keys in suite.

  - id: E7
    epic: "epic-e"
    milestone: "Horizon 1 — Cohort 1 Operate"
    title: "Remove unused `resend` dependency"
    priority: "P2"
    effort: "S"
    body: |
      What: Confirm no live code paths use `resend`, then remove from
      package.json and uninstall.

      Why: Hygiene; reduces supply-chain surface and clarifies which
      provider actually delivers email today.

      Acceptance:
