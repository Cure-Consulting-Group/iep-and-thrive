project_name: "IEP & Thrive — Cohort 1 to Year 2"
description: >
  Backlog for the IEP & Thrive Summer 2026 cohort and the path to Year 2
  productization. Founder-confirmed parameters override earlier roadmap
  assumptions: cohort cap is 6 students, single solo-founder instructor,
  no incremental marketing spend, enrollment deadline May 30, 2026,
  insurance required and not yet purchased.

milestones:
  - name: "Horizon 0 — Cohort 1 Launch"
    due: "2026-06-23"
    description: >
      Everything that must be true before the first student walks in on
      July 7. Conversion site, parent onboarding, instructor delivery
      surface, and minimum-viable compliance.
  - name: "Horizon 1 — Cohort 1 Operate"
    due: "2026-08-14"
    description: >
      Live-cohort operations: notifications, weekly digests, parent ↔
      instructor channel, attention flags, and reliability work that lands
      while the cohort is running.
  - name: "Horizon 2 — Year 2 Productization"
    due: "2026-12-31"
    description: >
      Multi-cohort, multi-tenancy, recurring school-year products, B2B,
      and outcomes-driven case studies for Year 2 marketing.

labels:
  priority:
    - name: "P0"
      color: "B60205"
      description: "Must ship before its horizon — blocks the cohort or compliance."
    - name: "P1"
      color: "D93F0B"
      description: "Should ship in its horizon — meaningful quality or risk reduction."
    - name: "P2"
      color: "FBCA04"
      description: "Nice to have — defer if pressed."
  effort:
    - name: "effort:S"
      color: "C2E0C6"
      description: "Small — under a day."
    - name: "effort:M"
      color: "BFD4F2"
      description: "Medium — 1–3 days."
    - name: "effort:L"
      color: "FEF2C0"
      description: "Large — most of a week."
    - name: "effort:XL"
      color: "F9D0C4"
      description: "Extra large — multi-week, likely needs decomposition."
  epic:
    - name: "epic-a"
      color: "1B4332"
      description: "Marketing Site Conversion Hardening"
    - name: "epic-b"
      color: "2D6A4F"
      description: "Parent Account Onboarding Polish"
    - name: "epic-c"
      color: "40916C"
      description: "Curriculum Delivery Infrastructure"
    - name: "epic-d"
      color: "B7E4C7"
      description: "Notification & Attention System"
    - name: "epic-e"
      color: "D4860B"
      description: "Data, Compliance, Reliability"
    - name: "epic-f"
      color: "6B6560"
      description: "Year 2 / Productization"
    - name: "epic-g"
      color: "FDFAF4"
      description: "Email Lifecycle System"
    - name: "epic-h"
      color: "40916C"
      description: "Tutoring Subscription & Booking"

tickets:
  # ---- Epic A — Marketing Site Conversion Hardening ----
  - id: A1
    epic: "epic-a"
    milestone: "Horizon 0 — Cohort 1 Launch"
    title: "Sweep all marketing copy for stale program details (grades, schedule, group size, deadline)"
    priority: "P0"
    effort: "S"
    body: |
      What: Audit every marketing surface (homepage, /program, /enroll, /faq,
      /about, footer, OG tags, drip emails) for outdated program details and
      align to current truth: grades 3–4, Mon–Fri schedule, cohort cap of 6,
      enrollment deadline May 30 2026.

      Why: Founder parameters changed after the initial copy pass. Stale
      numbers in even one place undermine trust with parents who are
      cross-checking sources before depositing.

      Acceptance:
      - grep produces zero hits for "8 students", "10 students", "Mon–Thu",
        "Mon-Thu", "April 30", "K–6th" outside of intentional historical
        references.
      - /faq, /program, /enroll, hero, urgency banner all show 6/Mon–Fri/3–4/May 30.
      - Drip email templates updated and re-sent through preview.

  - id: A2
    epic: "epic-a"
    milestone: "Horizon 0 — Cohort 1 Launch"
    title: "Add Parent Login link to nav + footer"
    priority: "P0"
    effort: "S"
    body: |
      What: Surface a "Parent Login" entry in both the primary nav (right
      side, before the Reserve CTA) and the footer "Enroll" column. Links
      to /portal (or current parent app entry path).

      Why: Enrolled families currently have no obvious way back into the
      portal from the marketing site. Reduces support pings and signals
      that this is a real product, not a brochure.

      Acceptance:
      - Visible at all breakpoints; appears in mobile drawer.
      - Uses outline-pill style so it doesn't compete with the Reserve CTA.
      - Footer link present in Enroll column.

  - id: A3
    epic: "epic-a"
    milestone: "Horizon 0 — Cohort 1 Launch"
    title: "Add May 30 countdown to hero + enrollment form"
    priority: "P0"
    effort: "S"
    done: true
    body: |
      What: Render a live "X days until enrollment closes" countdown
      adjacent to the hero CTA cluster and inside the enrollment form
      header. Stops at 0 and swaps to "Waitlist only" copy.

      Why: Scarcity + deadline is the strongest conversion lever we have
      with no marketing spend. Static "April 30" copy currently reads
      stale and the deadline moved to May 30.

      Acceptance:
      - Computed client-side from a single source-of-truth date constant.
      - Copy: "Enrollment closes in N days · May 30, 2026".
      - Falls back gracefully when N <= 0.

  - id: A4
    epic: "epic-a"
    milestone: "Horizon 0 — Cohort 1 Launch"
    title: "Add FAQPage JSON-LD to /faq"
    priority: "P1"
    effort: "S"
    body: |
      What: Emit schema.org FAQPage JSON-LD on the /faq route covering all
      8 Q&A entries.

      Why: Free SERP real estate for high-intent queries like "summer SPED
      program Long Island" — the only SEO lever available with no ad spend.

      Acceptance:
      - Validates in Google Rich Results Test.
      - Question and answer text matches rendered DOM exactly.
      - Lives in the page's <head> as an inline script tag with type
        application/ld+json.

  - id: A5
    epic: "epic-a"
    milestone: "Horizon 0 — Cohort 1 Launch"
    title: "\"Sample week\" teaser on /program drawn from week-1 markdown"
    priority: "P1"
    effort: "M"
    body: |
      What: Extract a sanitized "what a week looks like" block from the
      week-1 curriculum markdown and render it as a section on /program —
      block schedule + sample literacy/math/SEL activity descriptions, no
      proprietary scope/sequence detail.

      Why: Parents repeatedly ask "what will my kid actually do?" on
      discovery calls. A concrete daily picture closes the imagination gap
      and reduces low-information objections.

      Acceptance:
      - Pulled from a single source markdown file (no copy duplication).
      - Renders block schedule (literacy / movement / math / SEL / portfolio).
      - Includes 2–3 sample activities with kid-facing language.

  - id: A6
    epic: "epic-a"
    milestone: "Horizon 0 — Cohort 1 Launch"
    title: "Capture 1-2 video testimonials (founder reach-out task)"
    priority: "P1"
    effort: "L"
    body: |
      What: Founder-led task to reach out to 3–5 prior tutoring/intervention
      families, secure consent, capture short (60–90s) video testimonials,
      and embed on /about and the homepage testimonial strip.

      Why: Text testimonials are table stakes; video moves trust meaningfully
      for first-cohort prospects who can't yet rely on alumni word of mouth.

      Acceptance:
      - Signed video release for each subject.
      - Hosted on a CDN (Mux, Bunny, or Vimeo unlisted) — not raw mp4 from Firebase.
      - Lazy-loaded with poster image; meets Lighthouse perf budget.

  - id: A7
    epic: "epic-a"
    milestone: "Horizon 0 — Cohort 1 Launch"
    title: "Verify Summer Guide drip end-to-end with test email"
    priority: "P0"
    effort: "S"
    body: |
      What: Submit the Summer Guide opt-in form with a fresh test inbox,
      confirm every email in the sequence fires at the expected interval,
      links resolve, unsubscribe works, and tracking pixels (if any) load.

      Why: This is our only top-of-funnel nurture and we have not validated
      it since copy and parameters changed. A broken drip silently kills
      conversion.

      Acceptance:
      - Documented test run with timestamps of each delivery.
      - All links 200 and land on correct routes with current copy.
      - Unsubscribe flow verified.

  - id: A8
    epic: "epic-a"
    milestone: "Horizon 0 — Cohort 1 Launch"
    title: "Lighthouse pass on /, /program, /enroll; fix LCP/CLS regressions"
    priority: "P1"
    effort: "M"
    body: |
      What: Run Lighthouse (mobile) on the three highest-intent routes,
      capture baseline, and fix regressions until LCP < 2.5s and CLS < 0.1
      on a throttled mobile profile.

      Why: Conversion-critical pages. Mobile parents on weak signal will
      bounce before the hero paints. Also feeds SEO.

      Acceptance:
      - Before/after Lighthouse JSON committed to /docs/perf/.
      - LCP < 2.5s, CLS < 0.1, TBT under 200ms.
      - No render-blocking 3rd-party scripts in the critical path.

  - id: A9
    epic: "epic-a"
    milestone: "Horizon 1 — Cohort 1 Operate"
    title: "Intermediate /enroll/[program] confirmation step before Stripe"
    priority: "P2"
    effort: "M"
    body: |
      What: Insert a one-screen review step between the enrollment form
      and Stripe Checkout that summarizes program, deposit amount, balance
      due date, refund policy, and child name — with a single "Continue
      to secure payment" CTA.

      Why: Friction-as-feature: reduces refund disputes ("I didn't realize
      it was non-refundable") and chargebacks. Also a natural place to
      inject the e-sign agreement.

      Acceptance:
      - Route /enroll/[program]/confirm renders summary state.
      - Stripe session created server-side only after confirm.
      - Cancel returns to /#program with form values preserved.

  - id: A10
    epic: "epic-a"
    milestone: "Horizon 1 — Cohort 1 Operate"
    title: "Sticky mobile CTA: \"Book a free call\" alt to deposit"
    priority: "P2"
    effort: "S"
    body: |
      What: On mobile only, add a sticky bottom bar with two actions:
      "Reserve a Spot" (primary) and "Book a free call" (secondary). Hide
      on /enroll and once the form is in viewport.

      Why: Many mobile visitors aren't ready to deposit but will book a
      call. Today the secondary CTA is buried; making it always-reachable
      lifts call volume without taxing depositors.

      Acceptance:
      - Visible only at < 768px.
      - Hides when the enrollment form intersects viewport.
      - Does not overlap iOS home indicator (safe-area-inset-bottom).

  # ---- Epic B — Parent Account Onboarding Polish ----
  - id: B1
    epic: "epic-b"
    milestone: "Horizon 0 — Cohort 1 Launch"
    title: "Welcome email sequence post-signup (3 emails over 7 days)"
    priority: "P0"
    effort: "M"
    done: true
    body: |
      What: Three transactional emails fired after parent account creation:
      Day 0 (welcome + portal tour link), Day 2 (intake form nudge if
      incomplete), Day 7 (what to expect in Week 1 of cohort).

      Why: Closes the dead-air gap between deposit and program start.
      Without this, parents go quiet for weeks and intake-form completion
      stalls.

      Acceptance:
      - Sends only to enrolled-and-deposited parents.
      - Honors a sequence-stop flag if intake is already complete.
      - Templates live in the same notification system as cohort comms (one source).

  - id: B2
    epic: "epic-b"
    milestone: "Horizon 0 — Cohort 1 Launch"
    title: "Intake form completion rate dashboard (admin)"
    priority: "P1"
    effort: "S"
    body: |
      What: Single admin tile in /admin showing total enrolled vs intake
      complete, with a drill-down list of incomplete families and last
      reminder date.

      Why: Intake is the gate to cohort grouping and curriculum
      personalization. Founder needs a five-second view of who to chase.

      Acceptance:
      - Tile shows N complete / M enrolled.
      - Click-through to filterable list.
      - Last-reminder timestamp shown per family.

  - id: B3
    epic: "epic-b"
    milestone: "Horizon 1 — Cohort 1 Operate"
    title: "Multi-student support: parent with siblings"
    priority: "P1"
    effort: "M"
    body: |
      What: Parent account model supports N students, with per-student
      intake, deposits, and progress views. UI: student switcher in portal
      header.

      Why: ~10–15% of inquiries mention siblings. Today they'd have to
      create duplicate parent accounts, which fragments billing and
      progress views.

      Acceptance:
      - Data model: parents → students (1:N).
      - Portal navigation includes a student switcher.
      - Stripe customer is shared across siblings; one card on file.

  - id: B4
    epic: "epic-b"
    milestone: "Horizon 1 — Cohort 1 Operate"
    title: "Magic-link login option"
    priority: "P1"
    effort: "S"
    body: |
      What: Add passwordless email magic-link as an alternative to
      email+password sign-in.

      Why: Parents lose passwords. Magic links convert "I can't log in"
      tickets into a self-service flow and reduce abandoned-portal rates.

      Acceptance:
      - Toggle on the sign-in screen.
      - Link expires in 15 minutes, single-use.
      - Falls back cleanly if email delivery fails.

  - id: B5
    epic: "epic-b"
    milestone: "Horizon 1 — Cohort 1 Operate"
    title: "Parent profile completeness nudge"
    priority: "P2"
    effort: "S"
    body: |
      What: Soft progress bar in the portal home showing profile and
      intake completeness with a single CTA to the next missing field.

      Why: Gentle in-app nudge complements the email sequence (B1) and
      lifts intake completion without spam.

      Acceptance:
      - Bar disappears at 100%.
      - CTA deep-links to the specific incomplete section.
      - Dismissed state respected for the session.

  - id: B6
    epic: "epic-b"
    milestone: "Horizon 0 — Cohort 1 Launch"
    title: "Photo/video release e-signature capture"
    priority: "P0"
    effort: "M"
    status: "done"
    body: |
      What: Dedicated e-sign step in onboarding for photo/video release,
      separate from the enrollment agreement (E3). Stores signed PDF and
      timestamp in the parent record.

      Why: Required before any portfolio photos (C7) or showcase videos
      can be captured. Without per-student consent, we can't legally use
      images even internally.

      Acceptance:
      - Per-student consent (not per-parent).
      - Signed PDF stored in Firebase Storage with restricted access.
      - Admin view shows consent status per student.

  - id: B7
    epic: "epic-b"
    milestone: "Horizon 1 — Cohort 1 Operate"
    title: "Onboarding video (3 min Loom) embedded in portal home"
    priority: "P2"
    effort: "S"
    body: |
      What: Founder records a 3-minute Loom walking through the portal —
      where to find the daily plan, weekly reports, and message thread.
      Embed at the top of the parent portal home with dismiss control.

      Why: Cuts "how do I…" support requests and humanizes the product
      with the founder's voice.

      Acceptance:
      - Loom embed with poster image, lazy-loaded.
      - Dismiss persists per-parent.
      - Captions on.

  # ---- Epic C — Curriculum Delivery Infrastructure ----
  - id: C1
    epic: "epic-c"
    milestone: "Horizon 0 — Cohort 1 Launch"
    title: "Instructor \"Today's Plan\" view in /admin"
    priority: "P0"
    effort: "M"
    body: |
      What: Single-pane admin view that shows today's schedule, materials,
      per-block activities, and per-student notes for the current cohort
      day. Auto-advances by date.

      Why: With one instructor and six students across multiple blocks,
      the founder can't be flipping between markdown files. This is the
      primary in-the-room surface during program hours.

      Acceptance:
      - Loads in < 1s on a laptop on classroom Wi-Fi.
      - Reads from canonical curriculum source (markdown until C9).
      - Includes attendance and behavioral flag entry inline (links to C3).

  - id: C2
    status: done
    epic: "epic-c"
    milestone: "Horizon 0 — Cohort 1 Launch"
    title: "Materials prep checklist generator per week"
    priority: "P0"
    effort: "S"
    body: |
      What: Generate a printable/exportable checklist of all materials
      required for the upcoming week, aggregated from per-day lesson
      plans.

      Why: Solo instructor; no prep time on Monday morning. The checklist
      is the difference between a smooth week and a chaotic one.

      Acceptance:
      - Generates from week-N markdown.
      - Quantities aggregated and de-duped across days.
      - Exportable as PDF or printable HTML.

  - id: C3
    epic: "epic-c"
    milestone: "Horizon 0 — Cohort 1 Launch"
    title: "Per-student daily attendance + behavioral flag capture"
    priority: "P0"
    effort: "M"
    body: |
      What: Quick daily entry per student: present/absent/late, energy
      level, regulation flag, brief free-text note. Designed for thumb-
      tap on phone during transitions.

      Why: Feeds both attention flags (D2) and weekly progress reports
      (C6). Without daily capture, Friday reports become guesswork.

      Acceptance:
      - Single screen, < 30s to complete the cohort.
      - Optimistic UI; works offline and syncs.
      - Data structured for downstream report generation.

  - id: C4
    status: done
    epic: "epic-c"
    milestone: "Horizon 0 — Cohort 1 Launch"
    title: "Weekly OG probe data capture (phonics accuracy %, ORF wpm)"
    priority: "P0"
    effort: "M"
    body: |
      What: Structured capture of weekly Orton-Gillingham probe data —
      phonics accuracy %, oral reading fluency words-per-minute, error
      types — per student, with trend visualization.

      Why: This is the literal evidence the final CSE-ready report rests
      on. It needs to be structured data, not prose, from day one.

      Acceptance:
      - Schema covers phonics %, ORF wpm, error type tallies.
      - Trend chart per student over weeks.
      - Exportable to the final report (C6).

  - id: C5
    status: done
    epic: "epic-c"
    milestone: "Horizon 0 — Cohort 1 Launch"
    title: "Pre-/post-assessment battery digital capture"
    priority: "P0"
    effort: "L"
    body: |
      What: Digitize the pre-program and post-program assessment battery
      (informal phonics inventory, fluency probe, math screener, SEL
      self-report). Captures item-level responses, not just totals.

      Why: Pre/post deltas are the spine of the marketing case studies
      (F6) and the family-facing growth narrative. Paper-only capture
      will not survive into Year 2.

      Acceptance:
      - Item-level capture with rubric scoring.
      - Pre and post linked per student.
      - Admin export to CSV.

  - id: C6
    epic: "epic-c"
    milestone: "Horizon 1 — Cohort 1 Operate"
    title: "Auto-populate weekly progress report from C3+C4 data"
    priority: "P1"
    effort: "L"
    body: |
      What: Friday weekly report PDF auto-generated per student, pulling
      attendance (C3), OG probe data (C4), and a templated narrative slot
      for instructor commentary. Email delivery via the digest channel
      (D5).

      Why: Hand-writing six reports every Friday is unsustainable. A
      templated generator keeps the report consistent in voice and
      district-grade in format.

      Acceptance:
      - PDF render matches the marketing claim ("2-page progress summary").
      - Instructor narrative slot is the only manual input.
      - One-click "send to parent" with audit log.

  - id: C7
    epic: "epic-c"
    milestone: "Horizon 1 — Cohort 1 Operate"
    title: "Portfolio artifact upload (photos of student work) per student per week"
    priority: "P1"
    effort: "M"
    body: |
      What: Instructor uploads 1–3 photos of student work per student per
      week, tagged with week and (optionally) skill area. Surfaces in the
      parent portal under that student's portfolio.

      Why: Portfolio artifacts are the most emotionally resonant piece of
      the parent experience and the showcase (C8) is built from them.
      Requires consent gate (B6).

      Acceptance:
      - Upload from mobile in < 10s per artifact.
      - Auto-resized; original retained.
      - Gated by per-student photo release (B6).

  - id: C8
    epic: "epic-c"
    milestone: "Horizon 1 — Cohort 1 Operate"
    title: "End-of-program showcase prep checklist + invite emails"
    priority: "P1"
    effort: "M"
    body: |
      What: Run-of-show checklist for the final-day family showcase
      (logistics, student prep, materials), plus templated invite emails
      to families with RSVP capture.

      Why: The showcase is a primary referral and testimonial moment;
      executed sloppily it costs us Year 2 word of mouth.

      Acceptance:
      - Checklist covers T-2wk through T-day.
      - RSVP captured in admin tile.
      - Reminder email at T-3 days.

  - id: C9
    epic: "epic-c"
    milestone: "Horizon 2 — Year 2 Productization"
    title: "Migrate curriculum copy from .md to Firestore-backed CMS"
    priority: "P2"
    effort: "XL"
    body: |
      What: Replace the markdown-file-based curriculum source with a
      Firestore data model + admin CMS. Preserve markdown export for
      portability.

      Why: Year 2 with multiple cohorts/instructors requires versioned,
      multi-author curriculum editing. Markdown-as-source breaks once
      more than one human edits.

      Acceptance:
      - One-time migration from markdown to Firestore.
      - Admin editor with preview.
      - Markdown export round-trips losslessly.

  - id: C10
    epic: "epic-c"
    milestone: "Horizon 1 — Cohort 1 Operate"
    title: "Lesson-level \"I taught this\" check-off journal"
    priority: "P2"
    effort: "S"
    body: |
      What: Per-lesson checkbox the instructor taps to mark a lesson as
      delivered (or partially / skipped with reason). Aggregates into a
      coverage report.

      Why: Cheap audit trail for what was actually taught vs planned —
      useful for Year 2 curriculum tightening and CSE-meeting honesty.

      Acceptance:
      - One tap per lesson; optional skip-reason.
      - Coverage report aggregated weekly.
      - Surfaced in C1 inline.

  - id: C11
    epic: "epic-c"
    milestone: "Horizon 0 — Cohort 1 Launch"
    title: "Slim per-lesson page navigator payload (drop full meta prop)"
    priority: "P2"
    effort: "S"
    body: |
      What: The per-lesson static page (/admin/curriculum/lesson/[date])
      currently passes the full LessonMeta[] (date, week, day, label,
      title, subtitle, miniTheme for all 30 lessons) as a prop just to
      power prev/next/date-picker navigation. The navigator only ever
      reads `date`. Drop the prop and have LessonDayView import
      PROGRAM_DATES directly from the client-safe types module — that
      array already lives in the shared JS bundle.

      Why: Each per-lesson HTML embeds the meta JSON twice (server-render
      + hydration boot). For 30 pages on a phone in a classroom, this is
      ~10–15 KB of duplicate per page. Slim payload = faster TTI on
      cellular and lower hosting egress.

      Acceptance:
      - Per-lesson HTML drops by ≥10 KB.
      - Navigator UX unchanged (date picker, prev/next, jump-to-today,
        snap-to-nearest behaviors all preserved).
      - No new client-side fetches introduced.
  - id: D1
    epic: "epic-d"
    milestone: "Horizon 0 — Cohort 1 Launch"
    title: "Parent dashboard: \"This week's progress\" tile"
    priority: "P0"
    effort: "M"
    status: "done"
    body: |
      What: Always-visible tile on the parent portal home summarizing the
      current week — attendance, latest probe data, latest portfolio
      artifact, latest instructor note.

      Why: Parents shouldn't have to dig. The tile is the answer to "how
      is my kid doing?" without scheduling a call.

      Acceptance:
      - Renders empty-state cleanly pre-cohort.
      - All four data points pulled from canonical sources.
      - Click-through to deeper views.

  - id: D2
    epic: "epic-d"
    milestone: "Horizon 1 — Cohort 1 Operate"
    title: "Real-time attention flag → parent notification"
    priority: "P0"
    effort: "L"
    body: |
      What: When an instructor raises a behavioral/regulation flag (C3),
      a same-day notification fires to the parent (in-app + email) with
      a brief context note. Severity-tiered.

      Why: Trust is built on no-surprises. A bad day at 11am should not
      be the first thing the parent learns at pickup.

      Acceptance:
      - Severity tiers: heads-up / concern / urgent.
      - Urgent fires SMS too (D9 dependency).
      - Logged in audit trail.

  - id: D3
    epic: "epic-d"
    milestone: "Horizon 1 — Cohort 1 Operate"
    title: "In-app notification bell + unread state"
    priority: "P1"
    effort: "M"
    body: |
      What: Bell icon in the portal header with unread badge, opening a
      panel of recent notifications. Mark-read on click.

      Why: Email-only notifications get lost. An in-app inbox makes the
      portal the canonical source for "what's new with my kid."

      Acceptance:
      - Real-time unread count via Firestore listener.
      - Mark-read syncs across devices.
      - Empty-state copy is parent-warm, not generic.

  - id: D4
    epic: "epic-d"
    milestone: "Horizon 2 — Year 2 Productization"
    title: "Web Push notifications (PWA install prompt)"
    priority: "P2"
    effort: "L"
    body: |
      What: Convert the parent portal to a PWA, prompt for install, and
      enable Web Push for high-priority notifications.

      Why: Push beats email for time-sensitive alerts. Defer to Year 2 —
      Cohort 1 can ride email + SMS.

      Acceptance:
      - Manifest + service worker.
      - Install prompt timed thoughtfully (not on first visit).
      - Push permission requested only after first meaningful action.

  - id: D5
    epic: "epic-d"
    milestone: "Horizon 0 — Cohort 1 Launch"
    title: "Weekly digest email (Friday evening) consolidating progress"
