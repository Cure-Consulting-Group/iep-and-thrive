    title: "\"Missed pickup\" / late notification (mobile-fast)"
    priority: "P1"
    effort: "S"
    body: |
      What: One-tap instructor action that fires a "running 10/15/30 min
      late" notification to a parent (push + SMS).

      Why: Pickup logistics are a real-world failure mode. A solo
      instructor with six kids cannot also be making individual phone
      calls when a parent is late.

      Acceptance:
      - Two taps from C1 to send.
      - Pre-set delay options (10/15/30/custom).
      - Logged in C3 audit.

  - id: D7
    epic: "epic-d"
    milestone: "Horizon 2 — Year 2 Productization"
    title: "Goal-attainment threshold alerts"
    priority: "P2"
    effort: "M"
    body: |
