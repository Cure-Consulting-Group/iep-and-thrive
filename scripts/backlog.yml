      - Limited to the urgent subset (cost control).
      - Delivery receipts logged.

  - id: D10
    epic: "epic-d"
    milestone: "Horizon 1 — Cohort 1 Operate"
    title: "Email log admin viewer"
    priority: "P1"
    effort: "S"
    body: |
      What: Admin page listing all emails sent by the system with
      timestamp, recipient, template, and delivery status.

      Why: When a parent says "I never got the report," we need a 5-second
      answer. Today we'd be guessing.

      Acceptance:
