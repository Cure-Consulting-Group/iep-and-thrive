  - id: F6
    epic: "epic-f"
    milestone: "Horizon 2 — Year 2 Productization"
    title: "De-identified outcomes dataset + Year 2 marketing case studies"
    priority: "P2"
    effort: "L"
    body: |
      What: Aggregate cohort-1 pre/post (C5), OG probe trends (C4), and
      goal-attainment data (D7) into a de-identified dataset; produce 2–3
