      - Build green after removal.
      - Env var docs updated.

  - id: E8
    epic: "epic-e"
    milestone: "Horizon 1 — Cohort 1 Operate"
    title: "Document incident-response runbook"
    priority: "P1"
    effort: "S"
    body: |
      What: Short runbook in /docs covering: site down, payment failures,
      data exposure suspected, missing-child scenario, instructor
      illness. Each with first-30-minutes action list.

      Why: A solo operator under stress will not invent the right
      response. Pre-decisions made calmly are the runbook.

      Acceptance:
      - Five scenarios documented.
      - Contact list (insurer, attorney, hosting) embedded.
      - Reviewed before cohort kickoff.

  - id: E9
    epic: "epic-e"
    milestone: "Horizon 2 — Year 2 Productization"
    title: "Storage lifecycle: auto-archive cohort 1 data after 1yr"
    priority: "P2"
    effort: "S"
    body: |
      What: GCS lifecycle rules to move cohort-1 portfolio media and
      reports to coldline after 12 months.

      Why: Cost control as cohorts accumulate. Defer until we actually
      have a year of data to archive.

      Acceptance:
      - Lifecycle rules in Terraform/console.
      - Restore process documented.
      - Parent data NOT auto-deleted (only tiered).

  - id: E11
    epic: "epic-e"
    milestone: "Horizon 1 — Cohort 1 Operate"
    title: "Flatten users/{uid}/students subcollection to top-level students collection (N+1 fix)"
    priority: "P1"
    effort: "M"
    body: |
      What: Today `getAllStudents()` in lib/student-service.ts iterates
      every user doc and fires a separate getDocs against each user's
      `students` subcollection. The admin dashboard does the same to
      compute student counts. This is an N+1 read pattern: 1 query for
      users + N queries (one per parent). Same root cause hits the
      attendance roster, today's plan roster, and any admin view that
      lists "all students."

      Why: With 6 enrolled students and ~20 inquiry-stage parents, this
      is currently ~21 reads per page load — slow but not crashing. As
      parent base grows past 50, page loads will exceed 5s and may
      freeze the tab on slow devices. Fix before Year 2.

      Acceptance:
      - New top-level `students` collection with `parentId` field,
        composite index on `(parentId, createdAt desc)` and
        `(enrollmentStatus, createdAt desc)`.
      - `getAllStudents()` becomes a single getDocs against the flat
        collection.
      - `getStudentsByParent(parentId)` becomes a single where-query.
      - One-shot migration script in scripts/ to copy existing
        subcollection docs to the flat collection (preserve ids).
      - Firestore rules updated: parents read/write only where
        `resource.data.parentId == request.auth.uid`; admins read/write
        all.
      - Old subcollection left in place initially; deprecate after a
        Year 2 audit confirms no callers remain.

  - id: E13
    epic: "epic-e"
    milestone: "Horizon 0 — Cohort 1 Launch"
    title: "Test cohort accounts (3 parents at different lifecycle stages)"
    priority: "P0"
    effort: "S"
    body: |
      What: Create 3 real Firebase Auth parent accounts, each seeded
      with a realistic student record at a different cohort lifecycle
      stage (inquiry, deposited, enrolled). All test accounts marked so
      they don't pollute analytics, weekly digests, or roster counts.
      Credentials stored in 1Password (no Secret Manager — that's E14).

      Why: Founder is the only QA resource. Without test accounts, every
      portal-side check requires logging out of admin, logging into a
      real parent (or building impersonation, which is more work and has
      privacy implications). Test accounts in a separate browser
      profile = QA in 30 seconds.

      Acceptance:
      - 3 accounts created: parent-test-1/2/3@iepandthrive.com
      - Each has a [TEST]-prefixed student name, grade 3 or 4, realistic
        intake fields, distinct enrollmentStatus ('inquiry', 'deposited',
        'enrolled')
      - User profile flag `isTest: true` on all 3 accounts
      - sendWeeklyDigest, summer guide drip, and any future
        notification fan-outs filter out `isTest: true` users
      - Credentials documented in 1Password with the path noted in
        team docs (founder owns)
      - Admin views (roster, pipeline) visually distinguish test
        accounts (e.g. greyed-out badge or [TEST] prefix)

  - id: E14
    epic: "epic-e"
    milestone: "Horizon 1 — Cohort 1 Operate"
    title: "Test credentials in GCP Secret Manager + Playwright smoke tests"
    priority: "P1"
    effort: "M"
    body: |
      What: Pair with E6 (Playwright smoke test suite). Move E13's test
      account credentials from 1Password (interactive use) to GCP Secret
      Manager so headless CI can fetch them at runtime. Wire Playwright
      tests covering critical flows: enrollment form submit, login,
      portal load, intake form complete, attendance read.

      Why: Manual QA via test accounts catches UX bugs but doesn't
      auto-detect regressions. CI smoke tests run on every push,
      catching breakage before it lands in production. Secret Manager
      earns its keep when CI needs runtime credential access — a
      password manager can't serve a headless runner.

      Acceptance:
      - Secret Manager secret created: iep-and-thrive-test-credentials
        (JSON: {accounts: [{email, password, label}]})
      - IAM: only Cloud Build / GitHub Actions service account can read
      - Playwright suite added under tests/e2e/, runs against
        iep-and-thrive.web.app or a preview URL
      - 5 critical-path tests minimum; each completes in <60s
      - GH Actions workflow runs Playwright on every push to main
      - Failing test blocks deploy (paired with E10 CI fix)

  - id: E15
    epic: "epic-e"
    milestone: "Horizon 2 — Year 2 Productization"
    title: "Admin parent impersonation (read-only, support/debug)"
    priority: "P2"
    effort: "M"
    body: |
      What: Admin can select a real parent and view their portal as a
      read-only impersonation, for customer support ("I can't see my
      reports — let me see what you see"). Persistent banner, write-
      block on all parent mutations, audit log of every impersonation
      session.

      Why: Different use case than E13 (test accounts). Test accounts
      catch regressions in test-data shapes; impersonation is the only
      way to debug a specific real parent's issue without rebuilding
      their state. Defer until cohort 2 — at solo-founder + 6-student
      scale, founder can call the parent and walk through together.

      Acceptance:
      - useEffectiveUser() hook returns impersonated uid when admin
        sets it; own uid otherwise
      - Sticky orange banner: "Viewing as [Parent Name] · Exit"
      - All write services guard via isImpersonating flag and throw
      - impersonationLog/{id} collection records adminUid,
        targetParentUid, started/endedAt
      - ToS/privacy line discloses admin may view account data for
        support purposes (founder + counsel)

  - id: E12
    epic: "epic-e"
    milestone: "Horizon 0 — Cohort 1 Launch"
    title: "Harden client-side markdown renderer against malformed input"
    priority: "P0"
    effort: "S"
    body: |
      What: components/admin/MarkdownView.tsx had an infinite-loop bug in
      tokenize() that crashed the browser on lines starting with #/>/digit
      patterns the parser couldn't classify. Hot-fixed by handling h1-h5,
      tightening list-continuation regex, and adding a defensive
      `if (i === startI) i++` guard so the parser can never get stuck.
      File this ticket for follow-up: write a markdown corpus test that
      runs every curriculum/*.md file through tokenize+render and asserts
      it terminates within N ms.

      Why: We can't rely on curriculum authors to use only the markdown
      subset our parser handles. A malformed line should degrade
      gracefully (skip line) not crash the tab. Testing prevents
      regression.

      Acceptance:
      - New unit test in __tests__/markdown.test.ts (Jest or Vitest) that
        loops every .md file under curriculum/ and renders via the
        tokenizer with a 1000ms timeout per file.
      - Test fails if any file causes timeout, throw, or empty output.
      - Run as part of `npm run test` in CI.

  - id: E10
    epic: "epic-e"
    milestone: "Horizon 0 — Cohort 1 Launch"
    title: "Fix GitHub Actions hosting deploy (FIREBASE_SERVICE_ACCOUNT secret missing)"
    priority: "P1"
    effort: "S"
    body: |
      What: The `Deploy to Firebase` workflow has been failing on every
      push for ~6 weeks because `secrets.FIREBASE_SERVICE_ACCOUNT` is not
      set in repo settings. Site is currently shipped via local
      `firebase deploy`. Add the service account JSON to the repo as a
      GitHub Actions secret named exactly `FIREBASE_SERVICE_ACCOUNT`.

      Why: Local-only deploys are a single-point-of-failure (founder
      laptop). CI deploy gives reproducibility, audit trail, and unblocks
      future contributors. P1 not P0 because local deploy works today —
      but every push that fails CI generates noise and obscures real
      regressions.

      Acceptance:
      - Service account created in Firebase project `iep-and-thrive`
        with `Firebase Hosting Admin` + `Cloud Functions Developer` roles
        (least privilege; do NOT grant project Owner).
      - JSON key downloaded, pasted into GitHub repo Settings → Secrets
        → Actions as `FIREBASE_SERVICE_ACCOUNT`.
      - Trigger a fresh push (or re-run the latest failed run); workflow
        completes green.
      - Service account key file deleted from local disk after upload.
      - Optional: rotate key on a 90-day cadence (note in runbook E8).
  - id: F1
    epic: "epic-f"
    milestone: "Horizon 2 — Year 2 Productization"
    title: "Multi-cohort data model (cohorts collection, cohort-scoped students)"
    priority: "P1"
    effort: "XL"
    body: |
      What: Refactor the data model so students, reports, attendance,
      and curriculum are scoped to a cohort. Today everything is implicitly
      "cohort 1."

      Why: Without this, Year 2 is a fork. With it, Year 2 is
      configuration. Highest-leverage Horizon 2 work.

      Acceptance:
      - cohorts collection with start/end dates and roster.
      - All student-scoped data references cohortId.
      - Migration path for cohort-1 data documented.

  - id: F2
    epic: "epic-f"
    milestone: "Horizon 2 — Year 2 Productization"
    title: "Instructor multi-tenancy"
    priority: "P2"
    effort: "XL"
    body: |
      What: Multiple instructor identities, each scoped to their cohort(s).
      Admin role separate from instructor role.

      Why: Founder is the only instructor in Year 1. Year 2+ may bring
