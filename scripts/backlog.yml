  - id: F5
    epic: "epic-f"
    milestone: "Horizon 2 — Year 2 Productization"
    title: "District / B2B billing (PO + invoice flow)"
    priority: "P2"
    effort: "XL"
    body: |
      What: Support purchase orders and net-30 invoicing for district or
