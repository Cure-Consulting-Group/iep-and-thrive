      Mirrors the existing functions/src/stripe-checkout.ts (one-time
      payment mode) but uses subscription price IDs.

      Why: Existing checkout function only supports one-time mode for
      cohort deposits; subscription mode is a separate Stripe flow.

      Acceptance:
      - Endpoint accepts query/body { plan: 'weekly' | 'twice-weekly' }
      - Resolves price ID via lib/subscription.ts stripePriceIdEnvVar()
      - Creates session with success_url=/portal/subscription?welcome=1
        and cancel_url=/tutoring#pricing
      - Persists session.client_reference_id = uid (parent must be
        signed in; reject anonymous with 401)
      - Exported from functions/src/index.ts
      - Endpoint URL added to lib/functions-config.ts CLOUD_FUNCTIONS

  - id: H4
    epic: "epic-h"
    milestone: "Horizon 0 — Cohort 1 Launch"
    title: "Stripe webhook extension for subscription + invoice events"
    priority: "P0"
    effort: "M"
    body: |
      What: Extend functions/src/stripe-webhook.ts to handle:
      - customer.subscription.created → write users/{uid}.subscription
        SubscriptionState per lib/subscription.ts shape, send welcome
        email
      - customer.subscription.updated → patch state (status, periodEnd,
        cancelAtPeriodEnd)
      - customer.subscription.deleted → status='canceled'; send
        cancelled email
      - invoice.paid (subsequent renewal) → reset sessionsUsedThisCycle=0,
        update currentPeriodStart/End, send monthly receipt email
      - invoice.payment_failed → status='past_due', send recover email

      Map Stripe customerId → uid via existing
      stripeCustomerId field on users/{uid} (or look up by
      session.client_reference_id at first creation).

      Why: Webhook is the only authoritative writer of subscription
      state; client never writes it.

      Acceptance:
      - All 5 event types implemented
      - Idempotent (Stripe redelivers; check event.id in
        webhookEventLog/ collection)
      - Each handler logs to emailLog for the email it sends
      - Existing one-time payment flow (cohort deposits) untouched

  - id: H5
    epic: "epic-h"
    milestone: "Horizon 0 — Cohort 1 Launch"
    title: "BookingGate + SegmentedControl + tutoring slot type on /book"
    priority: "P0"
    effort: "L"
    body: |
      What: Extend app/book/page.tsx with a SegmentedControl tab
      (Discovery call / Tutoring session / Drop-in). Render gate
      states A/B/C/D/E per docs/tutoring-design.md §6 — drive
      branching from lib/subscription.ts bookingGateState() helper.

      Components to build:
      - components/ui/SegmentedControl.tsx (radiogroup pattern,
        keyboard arrow nav)
      - components/portal/BookingGate.tsx (states A, B, E)
      - components/portal/SessionsCounter.tsx (states C, D — chip,
        role=status aria-live=polite, prop-driven { used, allowed,
        cycleEnd })

      Tutoring slots are availableSlots/ docs with type: 'tutoring'.
      Booking a tutoring slot from state C decrements
      users/{uid}.subscription.sessionsUsedThisCycle in a transaction
      with the booking write.

      24-hour cancel policy enforced server-side: cancellation < 24h
      before slot DOES NOT decrement sessionsUsedThisCycle (forfeit).

      Why: Without the gate, anyone could book tutoring slots without
      paying.

      Acceptance:
      - All 5 states render correctly per design spec
      - SessionsCounter announces decrement to screen readers
      - Sessions counter decrement happens in same Firestore tx as
        booking write (no race)
      - Same-day cancellation forfeits (no decrement reversal)
      - Calendar dimmed overlay for state D (exhausted)
      - Policy block always visible below calendar in C/D
      - Existing discovery-call booking flow unchanged

