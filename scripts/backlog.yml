      - Restore process documented.
      - Parent data NOT auto-deleted (only tiered).

  - id: E11
    epic: "epic-e"
    milestone: "Horizon 1 — Cohort 1 Operate"
    title: "Flatten users/{uid}/students subcollection to top-level students collection (N+1 fix)"
    priority: "P1"
    effort: "M"
    body: |
      What: Today `getAllStudents()` in lib/student-service.ts iterates
      every user doc and fires a separate getDocs against each user's
      `students` subcollection. The admin dashboard does the same to
      compute student counts. This is an N+1 read pattern: 1 query for
      users + N queries (one per parent). Same root cause hits the
      attendance roster, today's plan roster, and any admin view that
      lists "all students."

      Why: With 6 enrolled students and ~20 inquiry-stage parents, this
      is currently ~21 reads per page load — slow but not crashing. As
      parent base grows past 50, page loads will exceed 5s and may
      freeze the tab on slow devices. Fix before Year 2.

      Acceptance:
      - New top-level `students` collection with `parentId` field,
        composite index on `(parentId, createdAt desc)` and
        `(enrollmentStatus, createdAt desc)`.
      - `getAllStudents()` becomes a single getDocs against the flat
        collection.
      - `getStudentsByParent(parentId)` becomes a single where-query.
      - One-shot migration script in scripts/ to copy existing
        subcollection docs to the flat collection (preserve ids).
      - Firestore rules updated: parents read/write only where
        `resource.data.parentId == request.auth.uid`; admins read/write
        all.
      - Old subcollection left in place initially; deprecate after a
        Year 2 audit confirms no callers remain.

  - id: E13
    epic: "epic-e"
    milestone: "Horizon 0 — Cohort 1 Launch"
    title: "Test cohort accounts (3 parents at different lifecycle stages)"
    priority: "P0"
    effort: "S"
    body: |
      What: Create 3 real Firebase Auth parent accounts, each seeded
      with a realistic student record at a different cohort lifecycle
      stage (inquiry, deposited, enrolled). All test accounts marked so
      they don't pollute analytics, weekly digests, or roster counts.
      Credentials stored in 1Password (no Secret Manager — that's E14).

      Why: Founder is the only QA resource. Without test accounts, every
      portal-side check requires logging out of admin, logging into a
      real parent (or building impersonation, which is more work and has
      privacy implications). Test accounts in a separate browser
      profile = QA in 30 seconds.

      Acceptance:
      - 3 accounts created: parent-test-1/2/3@iepandthrive.com
      - Each has a [TEST]-prefixed student name, grade 3 or 4, realistic
        intake fields, distinct enrollmentStatus ('inquiry', 'deposited',
        'enrolled')
      - User profile flag `isTest: true` on all 3 accounts
      - sendWeeklyDigest, summer guide drip, and any future
        notification fan-outs filter out `isTest: true` users
      - Credentials documented in 1Password with the path noted in
        team docs (founder owns)
      - Admin views (roster, pipeline) visually distinguish test
        accounts (e.g. greyed-out badge or [TEST] prefix)

  - id: E14
    epic: "epic-e"
    milestone: "Horizon 1 — Cohort 1 Operate"
    title: "Test credentials in GCP Secret Manager + Playwright smoke tests"
    priority: "P1"
    effort: "M"
    body: |
      What: Pair with E6 (Playwright smoke test suite). Move E13's test
      account credentials from 1Password (interactive use) to GCP Secret
      Manager so headless CI can fetch them at runtime. Wire Playwright
      tests covering critical flows: enrollment form submit, login,
      portal load, intake form complete, attendance read.

      Why: Manual QA via test accounts catches UX bugs but doesn't
      auto-detect regressions. CI smoke tests run on every push,
      catching breakage before it lands in production. Secret Manager
      earns its keep when CI needs runtime credential access — a
      password manager can't serve a headless runner.

      Acceptance:
      - Secret Manager secret created: iep-and-thrive-test-credentials
        (JSON: {accounts: [{email, password, label}]})
      - IAM: only Cloud Build / GitHub Actions service account can read
      - Playwright suite added under tests/e2e/, runs against
        iep-and-thrive.web.app or a preview URL
      - 5 critical-path tests minimum; each completes in <60s
      - GH Actions workflow runs Playwright on every push to main
      - Failing test blocks deploy (paired with E10 CI fix)

  - id: E15
    epic: "epic-e"
    milestone: "Horizon 2 — Year 2 Productization"
    title: "Admin parent impersonation (read-only, support/debug)"
    priority: "P2"
    effort: "M"
    body: |
      What: Admin can select a real parent and view their portal as a
      read-only impersonation, for customer support ("I can't see my
      reports — let me see what you see"). Persistent banner, write-
      block on all parent mutations, audit log of every impersonation
