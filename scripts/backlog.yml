      - Instructor sees only their cohorts.
      - Audit logs (E4) include actor role.

  - id: F3
    epic: "epic-f"
    milestone: "Horizon 2 — Year 2 Productization"
    title: "School-year Saturday tutoring product (recurring billing)"
    priority: "P2"
    effort: "XL"
