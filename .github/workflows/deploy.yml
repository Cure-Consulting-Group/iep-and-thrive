name: Deploy to Firebase

# Automatic deploys on push to main are disabled — deploys are manual only.
on:
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: 'https://npm.pkg.github.com'
          scope: '@cure-consulting-group'

      # See e2e.yml — using a classic PAT instead of GITHUB_TOKEN because
      # the private @cure-consulting-group/* scope can't be read with the
      # workflow's default token from this repo.
      - name: Install dependencies
        run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_PACKAGES_READ_TOKEN }}

      - name: Verify Firebase project
        run: node scripts/verify-firebase.mjs

      - name: Build Next.js
        run: npm run build
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: AIzaSyBI4iQ3G265Yawhbg_lUXQTggJBpYPueww
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: iep-and-thrive.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: iep-and-thrive
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: iep-and-thrive.firebasestorage.app
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: '564060847585'
          NEXT_PUBLIC_FIREBASE_APP_ID: '1:564060847585:web:1b8a235db532454f9166a0'
          NEXT_PUBLIC_SITE_URL: https://iepandthrive.com

      - name: Install Cloud Functions dependencies
        run: cd functions && npm ci

      - name: Build Cloud Functions
        run: cd functions && npm run build

      - name: Deploy to Firebase
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: iep-and-thrive
