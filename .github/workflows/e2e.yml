name: E2E (Playwright)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  playwright:
    name: Playwright smoke tests (production)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      E2E_BASE_URL: https://iep-and-thrive.web.app
      E2E_INQUIRY_PASSWORD: ${{ secrets.E2E_INQUIRY_PASSWORD }}
      E2E_DEPOSITED_PASSWORD: ${{ secrets.E2E_DEPOSITED_PASSWORD }}
      E2E_ENROLLED_PASSWORD: ${{ secrets.E2E_ENROLLED_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npx playwright test

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload trace artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7
