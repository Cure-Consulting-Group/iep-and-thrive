name: E2E (Playwright)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  playwright:
    name: Playwright smoke tests (production)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      E2E_BASE_URL: https://iep-and-thrive.web.app
      E2E_INQUIRY_PASSWORD: ${{ secrets.E2E_INQUIRY_PASSWORD }}
      E2E_DEPOSITED_PASSWORD: ${{ secrets.E2E_DEPOSITED_PASSWORD }}
      E2E_ENROLLED_PASSWORD: ${{ secrets.E2E_ENROLLED_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      # `registry-url` + `scope` makes setup-node write a scoped .npmrc
      # that routes @cure-consulting-group/* through GitHub Packages while
      # leaving the default npm registry intact for every other dep.
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: 'https://npm.pkg.github.com'
          scope: '@cure-consulting-group'

      # GITHUB_TOKEN can't read the private @cure-consulting-group/* scope
      # because the package's source repo doesn't grant this repo access
      # via Manage Actions access. Use a classic PAT with `read:packages`.
      - run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_PACKAGES_READ_TOKEN }}

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npx playwright test

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload trace artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7
