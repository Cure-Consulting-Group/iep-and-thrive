name: iOS CI

on:
  push:
    branches: [main]
    paths: ['ios/**', '.github/workflows/ios-ci.yml']
  pull_request:
    branches: [main]
    paths: ['ios/**', '.github/workflows/ios-ci.yml']

jobs:
  build:
    name: Build and Check
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Xcode 16.4 ships Swift 6.1, required by TCA 1.25.5 (see project.yml).
      - name: Select Xcode 16.4 (Swift 6.1)
        run: sudo xcode-select -s /Applications/Xcode_16.4.app

      - name: Verify Toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Build Project
        run: |
          xcodebuild build \
            -project ios/IEPAndThrive.xcodeproj \
            -scheme IEPAndThrive \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      # We can add SwiftLint here once configured
      # - name: SwiftLint
      #   run: swiftlint
