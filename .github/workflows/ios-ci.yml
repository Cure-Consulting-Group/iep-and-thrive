name: iOS CI

# ⏸ PAUSED 2026-06-11: disabled via `gh workflow disable` — the org
# exhausted its June Actions quota (macOS bills at 10x). Run iOS tests
# locally in the interim.
# Re-enable when the billing cycle resets on 2026-07-01:
#   gh workflow enable "iOS CI" --repo Cure-Consulting-Group/iep-and-thrive

on:
  push:
    branches: [main]
    paths: ['ios/**', '.github/workflows/ios-ci.yml']
  pull_request:
    branches: [main]
    paths: ['ios/**', '.github/workflows/ios-ci.yml']

jobs:
  build:
    name: Build and Check
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Xcode 16.4 ships Swift 6.1, required by TCA 1.25.5 (see project.yml).
      - name: Select Xcode 16.4 (Swift 6.1)
        run: sudo xcode-select -s /Applications/Xcode_16.4.app

      - name: Verify Toolchain
        run: |
          xcodebuild -version
          swift --version

      # TCA + swift-case-paths + swift-dependencies + swift-perception
      # all ship compiler-plugin macros. Xcode 15+ requires explicit trust
      # before they'll run, which isn't possible in headless CI — the
      # `-skipMacroValidation` flag tells xcodebuild to trust them.
      - name: Build Project
        run: |
          xcodebuild build \
            -project ios/IEPAndThrive.xcodeproj \
            -scheme IEPAndThrive \
            -destination 'generic/platform=iOS Simulator' \
            -skipMacroValidation \
            -skipPackagePluginValidation \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      # Run unit tests (TCA TestStore reducer coverage + LetterTracer
      # geometry). Uses a concrete simulator destination instead of the
      # generic one — `xcodebuild test` requires a real device.
      - name: Run Unit Tests
        run: |
          xcodebuild test \
            -project ios/IEPAndThrive.xcodeproj \
            -scheme IEPAndThrive \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -skipMacroValidation \
            -skipPackagePluginValidation \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      # We can add SwiftLint here once configured
      # - name: SwiftLint
      #   run: swiftlint
